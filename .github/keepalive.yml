name: Keepalive

on:
  schedule:
    - cron: "0 12 * * 1"   # every Monday at noon UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - name: Touch keepalive file and commit
        run: |
          mkdir -p .github
          date -u +%Y-%m-%dT%H:%M:%SZ > .github/last_keepalive.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/last_keepalive.txt
          git diff --staged --quiet || git commit -m "chore: keepalive"
          git push
